<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="max-age=31536000" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <link rel="icon" type="image/svg+xml" href="./src/assets/TigerYT PFP.svg" />
    <title>Tim's Portfolio</title>
  </head>
  <body>
    <div id="site"></div>
    
    <script type="module" src="/src/main.ts"></script>

    <script>
      window.addEventListener('mousemove', (e) => moveCursorBackground(e));

      function moveCursorBackground(e) {
        var elementToMove = document.getElementById('cursor');
        if (elementToMove) {
            let x = e.clientX, y = e.clientY;

            let elementBox = elementToMove.getBoundingClientRect();

            elementToMove.style.translate = `calc(${x}px - 50%) calc(${y}px - 50%)`;
            document.body.style.backgroundImage = `radial-gradient(at ${elementBox.left}px ${elementBox.top}px, color-mix(in srgb, var(--background-colour), black 25%), var(--background-colour))`;
        } else document.body.insertAdjacentHTML('afterbegin', '<div id="cursor"></div>');
      };
    </script>
  </body>
</html>

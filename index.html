<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="max-age=31536000" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <link rel="icon" type="image/svg+xml" href="./src/assets/TigerYT PFP.svg" />
    <title>Tim's Portfolio</title>
  </head>
  <body>
    <div id="cursor"></div>
    <div id="site"></div>
    
    <script type="module" src="/src/main.ts"></script>

    <script>
      window.addEventListener('mousemove', (e) => moveCursorBackground(e));

      function moveCursorBackground(e) {
          var elementToMove = document.getElementById('cursor');
          if (elementToMove) {
              let x = e.clientX - (elementToMove.offsetWidth / 2), y = e.clientY - (elementToMove.offsetHeight / 2);

              elementToMove.style.translate = `${x}px ${y}px`;
          }
      };
    </script>
  </body>
</html>
